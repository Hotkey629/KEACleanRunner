<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>청렴 러너 게임 - SESE 복구 버전</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #4facfe;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            background: #87CEEB;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: block;
        }
        .game-info, .controls { color: white; text-align: center; margin: 10px; }
    </style>
</head>
<body>
    <div class="game-info">
        <h1>🐧 청렴 러너 - SESE와 함께!</h1>
        <p>파란 아이템 수집 & 빨간 세균 밟기!</p>
    </div>
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    <div class="controls">
        <p>스페이스바 / ↑ 키 : 점프 (2단 점프 불가)</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 이미지 로딩 관리
        const imgs = {
            start: new Image(),
            play: new Image(),
            jump: new Image(),
            clear: new Image()
        };
        imgs.start.src = 'sese-start.gif';
        imgs.play.src = 'sese-play.gif';
        imgs.jump.src = 'sese-jump.gif';
        imgs.clear.src = 'sese-clear.gif';

        let gameState = { running: false, score: 0, itemsCollected: 0, enemiesKilled: 0, gameSpeed: 5, bgX: 0 };
        const player = { x: 120, y: 350, w: 70, h: 80, vy: 0, jumping: false, gravity: 0.7, jumpP: -14, ground: 350 };
        
        let items = [];
        let enemies = [];
        let particles = [];

        const dutyTexts = ['사적이해관계', '부동산보유', '민간활동', '거래신고', '퇴직자접촉'];
        const prohibitTexts = ['외부활동제한', '가족채용제한', '수의계약제한', '사적사용금지', '비밀이용금지'];

        // 파티클 (최소화)
        function createEffect(x, y, color) {
            for(let i=0; i<5; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6,
                    life: 20, color: color
                });
            }
        }

        function update() {
            if (!gameState.running) return;

            // 중력 및 이동
            player.vy += player.gravity;
            player.y += player.vy;
            if (player.y > player.ground) {
                player.y = player.ground;
                player.vy = 0;
                player.jumping = false;
            }

            // 아이템 처리
            for (let i = items.length - 1; i >= 0; i--) {
                items[i].x -= gameState.gameSpeed;
                if (checkCollision(player, items[i])) {
                    gameState.itemsCollected++;
                    gameState.score += 10;
                    createEffect(items[i].x, items[i].y, '#4CAF50');
                    items.splice(i, 1);
                    continue;
                }
                if (items[i].x < -100) items.splice(i, 1);
            }

            // 적 처리
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].x -= gameState.gameSpeed;
                // 밟기 판정 (플레이어가 내려오는 중이고 적의 머리 위일 때)
                if (player.vy > 0 && player.y + player.h < enemies[i].y + 30 && checkCollision(player, enemies[i])) {
                    gameState.enemiesKilled++;
                    gameState.score += 15;
                    player.vy = -10; // 밟고 튀어오르기
                    createEffect(enemies[i].x, enemies[i].y, '#F44336');
                    enemies.splice(i, 1);
                    continue;
                } 
                // 충돌 판정
                else if (checkCollision(player, enemies[i])) {
                    gameState.running = false;
                    alert("게임 오버! 점수: " + gameState.score);
                    location.reload();
                }
                if (enemies[i].x < -100) enemies.splice(i, 1);
            }

            // 파티클 업데이트
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life--;
                if(p.life <= 0) particles.splice(i, 1);
            });

            // 생성 로직
            if (Math.random() < 0.01 && items.length < 3) spawnItem();
            if (Math.random() < 0.007 && enemies.length < 2) spawnEnemy();

            // 클리어 조건
            if (gameState.itemsCollected >= 5 && gameState.enemiesKilled >= 5) {
                gameState.running = false;
                drawClear();
            }
        }

        function spawnItem() {
            items.push({ x: canvas.width, y: 220 + Math.random()*80, w: 60, h: 60, text: dutyTexts[Math.floor(Math.random()*5)] });
        }

        function spawnEnemy() {
            enemies.push({ x: canvas.width, y: 380, w: 60, h: 50, text: prohibitTexts[Math.floor(Math.random()*5)] });
        }

        function checkCollision(p, obj) {
            return p.x < obj.x + obj.w - 10 && p.x + p.w > obj.x + 10 && p.y < obj.y + obj.h - 10 && p.y + p.h > obj.y + 10;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 배경 & 땅
            ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#689F38"; ctx.fillRect(0, 430, canvas.width, 70);

            // 2. 플레이어 (SESE 이미지 적용)
            const currentImg = player.jumping ? imgs.jump : imgs.play;
            if (currentImg.complete) {
                ctx.drawImage(currentImg, player.x, player.y, player.w, player.h);
            } else {
                ctx.fillStyle = "black"; ctx.fillRect(player.x, player.y, player.w, player.h);
            }

            // 3. 아이템 (파란색 상자 + 텍스트)
            items.forEach(item => {
                ctx.fillStyle = "#1565C0";
                ctx.fillRect(item.x, item.y, item.w, 30);
                ctx.fillStyle = "white";
                ctx.font = "bold 12px sans-serif";
                ctx.fillText(item.text, item.x, item.y + 50);
            });

            // 4. 적 (빨간색 원 + 텍스트)
            enemies.forEach(enemy => {
                ctx.fillStyle = "#F44336";
                ctx.beginPath();
                ctx.arc(enemy.x + 30, enemy.y + 25, 25, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.fillText(enemy.text, enemy.x, enemy.y - 10);
            });

            // 5. 파티클
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
            });

            // 6. UI
            ctx.fillStyle = "black";
            ctx.font = "bold 20px sans-serif";
            ctx.fillText(`점수: ${gameState.score}  |  신고: ${gameState.itemsCollected}/5  |  제거: ${gameState.enemiesKilled}/5`, 20, 40);

            if (gameState.running) {
                update();
                requestAnimationFrame(draw);
            }
        }

        function drawClear() {
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (imgs.clear.complete) {
                ctx.drawImage(imgs.clear, canvas.width/2 - 100, canvas.height/2 - 150, 200, 200);
            }
            ctx.fillStyle = "white";
            ctx.font = "bold 40px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("청렴왕 등극!", canvas.width/2, canvas.height/2 + 100);
        }

        function showStart() {
            ctx.fillStyle = "#4facfe";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (imgs.start.complete) {
                ctx.drawImage(imgs.start, canvas.width/2 - 100, 100, 200, 200);
            }
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "bold 30px sans-serif";
            ctx.fillText("스페이스바를 눌러 시작!", canvas.width/2, 400);
        }

        window.addEventListener('keydown', e => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                if (!gameState.running) {
                    gameState.running = true;
                    draw();
                } else if (!player.jumping) {
                    player.vy = player.jumpP;
                    player.jumping = true;
                }
            }
        });

        // 이미지 로드 대기 후 시작 화면 표시
        setTimeout(showStart, 500);
    </script>
</body>
</html>
