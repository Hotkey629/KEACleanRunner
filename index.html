<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>청렴 러너 게임 - SESE와 함께!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .bg-particle {
            position: fixed;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp 8s linear infinite;
        }
        
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) translateX(100px) scale(1);
                opacity: 0;
            }
        }
        
        #gameCanvas {
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border: none;
            border-radius: 20px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.3),
                0 0 0 1px rgba(255,255,255,0.1),
                inset 0 1px 0 rgba(255,255,255,0.6);
            display: block;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        #gameCanvas:hover {
            transform: scale(1.02);
        }
        
        .game-info {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px 45px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 
                0 8px 32px 0 rgba(31, 38, 135, 0.37),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            animation: slideDown 0.6s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .game-info h1 {
            color: #fff;
            margin-bottom: 12px;
            font-size: 32px;
            text-shadow: 
                0 2px 10px rgba(0,0,0,0.3),
                0 0 20px rgba(255,255,255,0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from {
                text-shadow: 
                    0 2px 10px rgba(0,0,0,0.3),
                    0 0 20px rgba(255,255,255,0.5);
            }
            to {
                text-shadow: 
                    0 2px 10px rgba(0,0,0,0.3),
                    0 0 30px rgba(255,255,255,0.8),
                    0 0 40px rgba(102, 126, 234, 0.6);
            }
        }
        
        .game-info p {
            color: rgba(255, 255, 255, 0.95);
            font-size: 15px;
            line-height: 1.8;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        
        .controls {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px 35px;
            border-radius: 20px;
            margin-top: 25px;
            box-shadow: 
                0 8px 32px 0 rgba(31, 38, 135, 0.37),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .controls p {
            color: rgba(255, 255, 255, 0.95);
            font-size: 16px;
            margin: 8px 0;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        
        .highlight {
            color: #FFD700;
            font-weight: bold;
            text-shadow: 
                0 0 10px rgba(255, 215, 0, 0.8),
                0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-3px, 0); }
            20%, 40%, 60%, 80% { transform: translate(3px, 0); }
        }
        
        .shake {
            animation: shake 0.5s;
        }
    </style>
</head>
<body>
    <script>
        // 배경 파티클 10개로 감소
        for(let i = 0; i < 10; i++) {
            const particle = document.createElement('div');
            particle.className = 'bg-particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
            document.body.appendChild(particle);
        }
    </script>

    <div class="game-info">
        <h1>🐧 청렴 러너 게임 - SESE와 함께!</h1>
        <p>
            <span class="highlight">5대 신고·제출의무</span>를 수집하고 
            <span class="highlight">5대 제한·금지행위</span>를 밟아 제거하세요!
        </p>
    </div>
    
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    
    <div class="controls">
        <p>🎮 <strong>스페이스바</strong> 또는 <strong>↑</strong> 키를 눌러 점프하세요!</p>
        <p>📊 목표: 파란 아이템 5개 수집 + 빨간 세균 5개 제거</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // SESE 이미지들
        let startSeseImg = new Image();
        let playSeseImg = new Image();
        let jumpSeseImg = new Image();
        let clearSeseImg = new Image();
        
        let imagesLoaded = {
            start: false,
            play: false,
            jump: false,
            clear: false
        };

        startSeseImg.src = 'sese-start.gif';
        startSeseImg.onload = function() {
            imagesLoaded.start = true;
            checkAllImagesLoaded();
        };
        startSeseImg.onerror = function() {
            console.log('sese-start.gif를 찾을 수 없습니다.');
        };

        playSeseImg.src = 'sese-play.gif';
        playSeseImg.onload = function() {
            imagesLoaded.play = true;
            checkAllImagesLoaded();
        };
        playSeseImg.onerror = function() {
            console.log('sese-play.gif를 찾을 수 없습니다.');
        };

        jumpSeseImg.src = 'sese-jump.gif';
        jumpSeseImg.onload = function() {
            imagesLoaded.jump = true;
            checkAllImagesLoaded();
        };
        jumpSeseImg.onerror = function() {
            console.log('sese-jump.gif를 찾을 수 없습니다.');
        };

        clearSeseImg.src = 'sese-clear.gif';
        clearSeseImg.onload = function() {
            imagesLoaded.clear = true;
            checkAllImagesLoaded();
        };
        clearSeseImg.onerror = function() {
            console.log('sese-clear.gif를 찾을 수 없습니다.');
        };

        function checkAllImagesLoaded() {
            if (imagesLoaded.start && imagesLoaded.play && imagesLoaded.jump && imagesLoaded.clear) {
                drawStartScreen();
            }
        }

        let gameState = {
            running: false,
            score: 0,
            itemsCollected: 0,
            enemiesKilled: 0,
            gameSpeed: 3,
            backgroundX: 0
        };

        let particles = [];
        let backgroundParticles = [];

        const player = {
            x: 120,
            y: 350,
            width: 70,
            height: 80,
            velocityY: 0,
            jumping: false,
            gravity: 0.6,
            jumpPower: -13,
            groundY: 350
        };

        let items = [];
        let enemies = [];

        const dutyTexts = [
            '사적이해관계자\n신고',
            '부동산보유\n매수신고',
            '민간부문\n업무활동제출',
            '직무관련자\n거래신고',
            '퇴직자\n사적접촉신고'
        ];

        const prohibitTexts = [
            '직무관련\n외부활동제한',
            '가족채용\n제한',
            '수의계약\n체결제한',
            '공공기관물품\n사적사용금지',
            '직무상비밀\n이용금지'
        ];

        // 배경 파티클 클래스 (10개로 감소)
        class BackgroundParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random();
                this.fadeSpeed = Math.random() * 0.02 + 0.01;
                this.growing = Math.random() > 0.5;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.growing) {
                    this.opacity += this.fadeSpeed;
                    if (this.opacity >= 1) this.growing = false;
                } else {
                    this.opacity -= this.fadeSpeed;
                    if (this.opacity <= 0) this.growing = true;
                }

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#fff';
                // shadowBlur 제거
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 배경 파티클 10개로 초기화
        for (let i = 0; i < 10; i++) {
            backgroundParticles.push(new BackgroundParticle());
        }

        // 파티클 클래스 (최적화 - shadowBlur 제거)
        class Particle {
            constructor(x, y, color, text) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 6 - 3;
                this.alpha = 1;
                this.color = color;
                this.text = text;
                this.life = 60;
                this.size = Math.random() * 20 + 10;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15;
                this.rotation += this.rotationSpeed;
                this.alpha -= 0.016;
                this.life--;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // shadowBlur 완전 제거
                ctx.fillStyle = this.color;
                ctx.font = 'bold 24px Malgun Gothic';
                ctx.textAlign = 'center';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.strokeText(this.text, 0, 0);
                ctx.fillText(this.text, 0, 0);
                ctx.restore();
            }
        }

        // 파티클 5개로 감소
        function createParticles(x, y, color, text) {
            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(x, y, color, text));
            }
        }

        function createItem() {
            const randomDuty = dutyTexts[Math.floor(Math.random() * dutyTexts.length)];
            items.push({
                x: canvas.width,
                y: 220 + Math.random() * 80,
                width: 50,
                height: 50,
                text: randomDuty,
                collected: false,
                pulse: 0
            });
        }

        function createEnemy() {
            const randomProhibit = prohibitTexts[Math.floor(Math.random() * prohibitTexts.length)];
            enemies.push({
                x: canvas.width,
                y: player.groundY + player.height - 35,
                width: 55,
                height: 35,
                text: randomProhibit,
                killed: false,
                rotation: 0
            });
        }

        // 배경 그리기 (shadowBlur 제거)
        function drawBackground() {
            // 배경 파티클
            backgroundParticles.forEach(p => {
                p.update();
                p.draw();
            });

            // 구름 (shadowBlur 제거)
            for (let i = 0; i < 5; i++) {
                const cloudX = (gameState.backgroundX * 0.5 + i * 200) % (canvas.width + 100);
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(cloudX, 50 + i * 20, 20, 0, Math.PI * 2);
                ctx.arc(cloudX + 20, 50 + i * 20, 25, 0, Math.PI * 2);
                ctx.arc(cloudX + 40, 50 + i * 20, 20, 0, Math.PI * 2);
                ctx.fill();
            }

            // 땅 (그라디언트)
            const groundGradient = ctx.createLinearGradient(0, player.groundY + player.height, 0, canvas.height);
            groundGradient.addColorStop(0, '#8BC34A');
            groundGradient.addColorStop(1, '#689F38');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, player.groundY + player.height, canvas.width, canvas.height);

            // 땅 무늬
            ctx.strokeStyle = '#558B2F';
            ctx.lineWidth = 2;
            for (let i = 0; i < canvas.width; i += 30) {
                const grassX = (i - gameState.backgroundX) % canvas.width;
                ctx.beginPath();
                ctx.moveTo(grassX, player.groundY + player.height);
                ctx.lineTo(grassX + 5, player.groundY + player.height + 10);
                ctx.moveTo(grassX + 10, player.groundY + player.height);
                ctx.lineTo(grassX + 15, player.groundY + player.height + 10);
                ctx.stroke();
            }
        }

        // SESE 캐릭터 그리기 (shadowBlur 제거)
        function drawPlayer() {
            if (player.jumping && imagesLoaded.jump) {
                ctx.drawImage(jumpSeseImg, player.x, player.y, player.width, player.height);
            } else if (imagesLoaded.play) {
                ctx.drawImage(playSeseImg, player.x, player.y, player.width, player.height);
            } else {
                drawDefaultPenguin();
            }
        }

        function drawDefaultPenguin() {
            const px = player.x;
            const py = player.y;
            
            ctx.fillStyle = '#FF8C00';
            ctx.beginPath();
            ctx.ellipse(px + 20, py + player.height - 5, 8, 5, 0, 0, Math.PI * 2);
            ctx.ellipse(px + 40, py + player.height - 5, 8, 5, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#2C3E50';
            ctx.beginPath();
            ctx.ellipse(px + player.width/2, py + 40, 25, 35, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.ellipse(px + player.width/2, py + 45, 18, 25, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#2C3E50';
            ctx.beginPath();
            ctx.arc(px + player.width/2, py + 18, 20, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.ellipse(px + player.width/2, py + 22, 14, 12, 0, 0, Math.PI);
            ctx.fill();

            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(px + player.width/2 - 7, py + 15, 5, 0, Math.PI * 2);
            ctx.arc(px + player.width/2 + 7, py + 15, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(px + player.width/2 - 6, py + 15, 3, 0, Math.PI * 2);
            ctx.arc(px + player.width/2 + 8, py + 15, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FF8C00';
            ctx.beginPath();
            ctx.moveTo(px + player.width/2 - 5, py + 22);
            ctx.lineTo(px + player.width/2 + 5, py + 22);
            ctx.lineTo(px + player.width/2, py + 26);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#2C3E50';
            ctx.beginPath();
            ctx.ellipse(px + 10, py + 40, 7, 20, -0.3, 0, Math.PI * 2);
            ctx.ellipse(px + 50, py + 40, 7, 20, 0.3, 0, Math.PI * 2);
            ctx.fill();
        }

        // 아이템 그리기 (shadowBlur 제거)
        function drawItems() {
            items.forEach(function(item, index) {
                if (!item.collected) {
                    item.pulse += 0.1;
                    const pulseSize = Math.sin(item.pulse) * 3;
                    
                    ctx.fillStyle = '#4CAF50';
                    ctx.beginPath();
                    ctx.arc(item.x + item.width / 2, item.y + 15, item.width / 2 + pulseSize, Math.PI, 0);
                    ctx.fill();

                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(item.x + 15, item.y + 9, 5, 0, Math.PI * 2);
                    ctx.arc(item.x + 27, item.y + 12, 5, 0, Math.PI * 2);
                    ctx.arc(item.x + 38, item.y + 9, 5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#FFF9C4';
                    ctx.fillRect(item.x + item.width / 2 - 7, item.y + 15, 14, 20);

                    ctx.fillStyle = '#1565C0';
                    ctx.font = 'bold 14px Malgun Gothic';
                    ctx.textAlign = 'center';
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 4;
                    
                    const lines = item.text.split('\n');
                    lines.forEach(function(line, i) {
                        ctx.strokeText(line, item.x + item.width / 2, item.y + 50 + i * 16);
                        ctx.fillText(line, item.x + item.width / 2, item.y + 50 + i * 16);
                    });

                    item.x -= gameState.gameSpeed;

                    if (checkCollision(player, item)) {
                        item.collected = true;
                        gameState.itemsCollected++;
                        gameState.score += 10;
                        createParticles(item.x + item.width/2, item.y + item.height/2, '#4CAF50', '청렴!');
                        screenShake();
                    }

                    if (item.x + item.width < 0) {
                        items.splice(index, 1);
                    }
                }
            });
        }

        // 적 그리기 (shadowBlur 제거)
        function drawEnemies() {
            enemies.forEach(function(enemy, index) {
                if (!enemy.killed) {
                    enemy.rotation += 0.05;
                    
                    ctx.save();
                    ctx.translate(enemy.x + 27, enemy.y + 17);
                    ctx.rotate(enemy.rotation);
                    
                    ctx.fillStyle = '#F44336';
                    ctx.beginPath();
                    ctx.arc(0, 0, 17, 0, Math.PI * 2);
                    ctx.fill();

                    for (let i = 0; i < 8; i++) {
                        const angle = (Math.PI * 2 / 8) * i;
                        const spikeX = Math.cos(angle) * 17;
                        const spikeY = Math.sin(angle) * 17;
                        ctx.fillStyle = '#D32F2F';
                        ctx.beginPath();
                        ctx.arc(spikeX, spikeY, 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    ctx.restore();
                    
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(enemy.x + 22, enemy.y + 14, 5, 0, Math.PI * 2);
                    ctx.arc(enemy.x + 32, enemy.y + 14, 5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(enemy.x + 22, enemy.y + 14, 2.5, 0, Math.PI * 2);
                    ctx.arc(enemy.x + 32, enemy.y + 14, 2.5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#C62828';
                    ctx.font = 'bold 13px Malgun Gothic';
                    ctx.textAlign = 'center';
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 4;
                    
                    const lines = enemy.text.split('\n');
                    lines.forEach(function(line, i) {
                        ctx.strokeText(line, enemy.x + 27, enemy.y + 50 + i * 15);
                        ctx.fillText(line, enemy.x + 27, enemy.y + 50 + i * 15);
                    });

                    enemy.x -= gameState.gameSpeed;

                    if (player.velocityY > 0 && 
                        player.x < enemy.x + enemy.width &&
                        player.x + player.width > enemy.x &&
                        player.y + player.height >= enemy.y &&
                        player.y + player.height <= enemy.y + enemy.height + 10) {
                        enemy.killed = true;
                        gameState.enemiesKilled++;
                        gameState.score += 15;
                        player.velocityY = player.jumpPower * 0.5;
                        createParticles(enemy.x + enemy.width/2, enemy.y + enemy.height/2, '#FF5722', '청렴!');
                        screenShake();
                    }

                    if (!enemy.killed && 
                        player.x < enemy.x + enemy.width &&
                        player.x + player.width > enemy.x &&
                        player.y + player.height > enemy.y + 10 &&
                        player.velocityY <= 0) {
                        gameOver();
                    }

                    if (enemy.x + enemy.width < 0) {
                        enemies.splice(index, 1);
                    }
                }
            });
        }

        function screenShake() {
            canvas.classList.add('shake');
            setTimeout(() => {
                canvas.classList.remove('shake');
            }, 500);
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // 점수판 그리기 (shadowBlur 제거)
        function drawScore() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
            roundRect(ctx, 10, 10, 320, 115, 15);
            ctx.fill();
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            roundRect(ctx, 10, 10, 320, 115, 15);
            ctx.stroke();

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 19px Malgun Gothic';
            ctx.textAlign = 'left';
            ctx.fillText('점수: ' + gameState.score, 25, 42);
            ctx.fillText('📘 신고의무: ' + gameState.itemsCollected + '/5', 25, 72);
            ctx.fillText('🦠 금지행위 제거: ' + gameState.enemiesKilled + '/5', 25, 102);
        }

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function updatePlayer() {
            player.velocityY += player.gravity;
            player.y += player.velocityY;

            if (player.y >= player.groundY) {
                player.y = player.groundY;
                player.velocityY = 0;
                player.jumping = false;
            }
        }

        function jump() {
            if (!player.jumping && player.y === player.groundY) {
                player.velocityY = player.jumpPower;
                player.jumping = true;
            }
        }

        function gameOver() {
            gameState.running = false;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 50px Malgun Gothic';
            ctx.textAlign = 'center';
            ctx.fillText('게임 오버!', canvas.width / 2, canvas.height / 2 - 50);
            
            ctx.fillStyle = '#FFD700';
            ctx.font = '24px Malgun Gothic';
            ctx.fillText('최종 점수: ' + gameState.score, canvas.width / 2, canvas.height / 2 + 10);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 28px Malgun Gothic';
            ctx.fillText('스페이스바를 눌러 다시 시작', canvas.width / 2, canvas.height / 2 + 60);
        }

        function gameClear() {
            gameState.running = false;
            
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, 'rgba(0, 191, 255, 0.9)');
            gradient.addColorStop(1, 'rgba(138, 43, 226, 0.9)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 축하 파티클 (shadowBlur 제거)
            for (let i = 0; i < 50; i++) {
                ctx.save();
                ctx.globalAlpha = Math.random();
                ctx.fillStyle = ['#FFD700', '#FF69B4', '#00FF00', '#FF4500'][Math.floor(Math.random() * 4)];
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                ctx.beginPath();
                ctx.arc(x, y, Math.random() * 5 + 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            if (imagesLoaded.clear) {
                ctx.drawImage(clearSeseImg, canvas.width / 2 - 100, canvas.height / 2 - 180, 200, 200);
            }
            
            ctx.fillStyle = '#fff';
            roundRect(ctx, canvas.width / 2 - 180, canvas.height / 2 + 40, 360, 80, 20);
            ctx.fill();
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 4;
            roundRect(ctx, canvas.width / 2 - 180, canvas.height / 2 + 40, 360, 80, 20);
            ctx.stroke();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 50, canvas.height / 2 + 40);
            ctx.lineTo(canvas.width / 2 - 30, canvas.height / 2 + 20);
            ctx.lineTo(canvas.width / 2 - 20, canvas.height / 2 + 40);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#FF6B35';
            ctx.font = 'bold 40px Malgun Gothic';
            ctx.textAlign = 'center';
            ctx.fillText('당신도 청렴왕!', canvas.width / 2, canvas.height / 2 - 190);
            
            ctx.fillStyle = '#333';
            ctx.font = 'bold 28px Malgun Gothic';
            ctx.fillText('최종 점수: ' + gameState.score, canvas.width / 2, canvas.height / 2 + 90);
    
            ctx.fillStyle = '#4169E1';
            ctx.font = 'bold 24px Malgun Gothic';
            ctx.fillText('스페이스바를 눌러 다시 시작', canvas.width / 2, canvas.height / 2 + 220);
        }

        function resetGame() {
            gameState = {
                running: true,
                score: 0,
                itemsCollected: 0,
                enemiesKilled: 0,
                gameSpeed: 3,
                backgroundX: 0
            };
            
            player.y = player.groundY;
            player.velocityY = 0;
            player.jumping = false;
            
            items = [];
            enemies = [];
            particles = [];
        }

        let lastItemTime = 0;
        let lastEnemyTime = 0;
        let frameCount = 0;

        function gameLoop() {
            if (!gameState.running) {
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            gameState.backgroundX += gameState.gameSpeed;

            updatePlayer();
            drawPlayer();

            frameCount++;
            if (frameCount - lastItemTime > 120 && gameState.itemsCollected < 5) {
                createItem();
                lastItemTime = frameCount;
            }

            if (frameCount - lastEnemyTime > 180 && gameState.enemiesKilled < 5) {
                createEnemy();
                lastEnemyTime = frameCount;
            }

            drawItems();
            drawEnemies();
            updateParticles();
            drawScore();

            if (gameState.itemsCollected >= 5 && gameState.enemiesKilled >= 5) {
                gameClear();
                return;
            }

            if (frameCount % 600 === 0) {
                gameState.gameSpeed += 0.5;
            }

            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (!gameState.running) {
                    resetGame();
                    gameLoop();
                } else {
                    jump();
                }
            }
        });

        function drawStartScreen() {
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, 'rgba(102, 126, 234, 0.95)');
            gradient.addColorStop(1, 'rgba(118, 75, 162, 0.95)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 반짝이는 별들 (shadowBlur 제거)
            for (let i = 0; i < 30; i++) {
                ctx.save();
                ctx.globalAlpha = Math.random();
                ctx.fillStyle = '#fff';
                const x = Math.random() * canvas.width;
                const y = Math.random() * 200;
                ctx.beginPath();
                ctx.arc(x, y, Math.random() * 2 + 1, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 48px Malgun Gothic';
            ctx.textAlign = 'center';
            ctx.fillText('🐧 청렴 러너 게임', canvas.width / 2, 50);

            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.font = '24px Malgun Gothic';
            ctx.fillText('SESE와 함께하는 이해충돌방지법', canvas.width / 2, 100);
            
            if (imagesLoaded.start) {
                ctx.drawImage(startSeseImg, canvas.width / 2 - 120, 130, 240, 240);
            }
            
            ctx.fillStyle = '#fff';
            ctx.font = '20px Malgun Gothic';
            ctx.fillText('📘 5대 신고·제출의무를 수집하세요', canvas.width / 2, 400);
            ctx.fillText('🦠 5대 제한·금지행위를 밟아 제거하세요', canvas.width / 2, 430);
            
            ctx.font = 'bold 28px Malgun Gothic';
            ctx.fillStyle = '#FFD700';
            ctx.fillText('스페이스바를 눌러 시작!', canvas.width / 2, 480);
        }

        drawStartScreen();
    </script>
</body>
