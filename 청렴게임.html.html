<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>청렴 러너 게임 - SESE와 함께!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Malgun Gothic', sans-serif;
        }
        
        #gameCanvas {
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border: 5px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: block;
        }
        
        .game-info {
            background: white;
            padding: 20px 40px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .game-info h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .game-info p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .controls {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .controls p {
            color: #333;
            font-size: 16px;
            margin: 5px 0;
        }
        
        .highlight {
            color: #667eea;
            font-weight: bold;
        }

        #imageUpload {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .upload-section {
            margin: 10px 0;
        }

        .upload-section label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .upload-section input {
            margin: 5px 0;
            padding: 5px;
        }

        .upload-note {
            font-size: 11px;
            color: #999;
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <div class="game-info">
        <h1>🐧 청렴 러너 게임 - SESE와 함께!</h1>
        <p>
            <span class="highlight">5대 신고·제출의무</span>를 수집하고 
            <span class="highlight">5대 제한·금지행위</span>를 밟아 제거하세요!
        </p>
    </div>

    <div id="imageUpload">
        <p style="font-weight: bold; margin-bottom: 15px; color: #667eea;">🐧 SESE 캐릭터 GIF 업로드</p>
        
        <div class="upload-section">
            <label1️⃣ 시작 화면 (탐정세세.GIF):</label>
            <input type="file" id="startImage" accept="image/gif">
            <p class="upload-note">시작 화면에 표시될 SESE</p>
        </div>

        <div class="upload-section">
            <label>2️⃣ 게임 플레이 (기본세세.GIF):</label>
            <input type="file" id="playImage" accept="image/gif">
            <p class="upload-note">게임 중 움직이는 SESE</p>
        </div>

        <div class="upload-section">
            <label>3️⃣ 클리어 화면 (인사하는세세.GIF):</label>
            <input type="file" id="clearImage" accept="image/gif">
            <p class="upload-note">게임 클리어 시 인사하는 SESE</p>
        </div>

        <p style="font-size: 12px; color: #666; margin-top: 15px;">
            ✅ 3개 모두 업로드 후 게임 시작! | 같은 폴더에 파일 저장 시 자동 로드
        </p>
    </div>
    
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    
    <div class="controls">
        <p>🎮 <strong>스페이스바</strong> 또는 <strong>↑</strong> 키를 눌러 점프하세요!</p>
        <p>📊 목표: 파란 아이템 5개 수집 + 빨간 세균 5개 제거</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // SESE 이미지들
        let startSeseImg = new Image();
        let playSeseImg = new Image();
        let clearSeseImg = new Image();
        
        let imagesLoaded = {
            start: false,
            play: false,
            clear: false
        };

        // 시작 화면 이미지 업로드
        document.getElementById('startImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    startSeseImg.src = event.target.result;
                    startSeseImg.onload = function() {
                        imagesLoaded.start = true;
                        checkAllImagesLoaded();
                    };
                };
                reader.readAsDataURL(file);
            }
        });

        // 플레이 이미지 업로드
        document.getElementById('playImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    playSeseImg.src = event.target.result;
                    playSeseImg.onload = function() {
                        imagesLoaded.play = true;
                        checkAllImagesLoaded();
                    };
                };
                reader.readAsDataURL(file);
            }
        });

        // 클리어 이미지 업로드
        document.getElementById('clearImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    clearSeseImg.src = event.target.result;
                    clearSeseImg.onload = function() {
                        imagesLoaded.clear = true;
                        checkAllImagesLoaded();
                    };
                };
                reader.readAsDataURL(file);
            }
        });

        // 모든 이미지 로드 확인
        function checkAllImagesLoaded() {
            if (imagesLoaded.start && imagesLoaded.play && imagesLoaded.clear) {
                alert('🎉 모든 SESE 캐릭터가 로드되었습니다!\n게임을 시작하세요! 🐧');
                drawStartScreen();
            }
        }

        // 기본 이미지 경로 (같은 폴더에 파일이 있을 경우)
        startSeseImg.src = '탐정세세.GIF';
        startSeseImg.onload = function() {
            imagesLoaded.start = true;
            console.log('시작 SESE 로드 완료!');
        };
        startSeseImg.onerror = function() {
            console.log('탐정세세.GIF를 찾을 수 없습니다.');
        };

        playSeseImg.src = '기본세세.GIF';
        playSeseImg.onload = function() {
            imagesLoaded.play = true;
            console.log('플레이 SESE 로드 완료!');
        };
        playSeseImg.onerror = function() {
            console.log('기본세세.GIF를 찾을 수 없습니다.');
        };

        clearSeseImg.src = '인사하는세세.GIF';
        clearSeseImg.onload = function() {
            imagesLoaded.clear = true;
            console.log('클리어 SESE 로드 완료!');
        };
        clearSeseImg.onerror = function() {
            console.log('인사하는세세.GIF를 찾을 수 없습니다.');
        };

        // 게임 상태
        let gameState = {
            running: false,
            score: 0,
            itemsCollected: 0,
            enemiesKilled: 0,
            gameSpeed: 3,
            backgroundX: 0
        };

        // 파티클 효과 배열
        let particles = [];

        // 캐릭터
        const player = {
            x: 120,
            y: 350,
            width: 70,
            height: 80,
            velocityY: 0,
            jumping: false,
            gravity: 0.6,
            jumpPower: -13,
            groundY: 350
        };

        // 아이템과 적 배열
        let items = [];
        let enemies = [];

        // 5대 신고·제출의무 텍스트
        const dutyTexts = [
            '사적이해관계자\n신고',
            '부동산보유\n매수신고',
            '민간부문\n업무활동제출',
            '직무관련자\n거래신고',
            '퇴직자\n사적접촉신고'
        ];

        // 5대 제한·금지행위 텍스트
        const prohibitTexts = [
            '직무관련\n외부활동제한',
            '가족채용\n제한',
            '수의계약\n체결제한',
            '공공기관물품\n사적사용금지',
            '직무상비밀\n이용금지'
        ];

        // 파티클 클래스
        class Particle {
            constructor(x, y, color, text) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4 - 2;
                this.alpha = 1;
                this.color = color;
                this.text = text;
                this.life = 60;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1;
                this.alpha -= 0.02;
                this.life--;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.font = 'bold 24px Malgun Gothic';
                ctx.textAlign = 'center';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 4;
                ctx.strokeText(this.text, this.x, this.y);
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        // 파티클 생성 함수
        function createParticles(x, y, color, text) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, color, text));
            }
        }

        // 아이템 생성
        function createItem() {
            const randomDuty = dutyTexts[Math.floor(Math.random() * dutyTexts.length)];
            items.push({
                x: canvas.width,
                y: 220 + Math.random() * 80,
                width: 50,
                height: 50,
                text: randomDuty,
                collected: false
            });
        }

        // 적 생성
        function createEnemy() {
            const randomProhibit = prohibitTexts[Math.floor(Math.random() * prohibitTexts.length)];
            enemies.push({
                x: canvas.width,
                y: player.groundY + player.height - 35,
                width: 55,
                height: 35,
                text: randomProhibit,
                killed: false
            });
        }

        // 배경 그리기
        function drawBackground() {
            // 구름
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            for (let i = 0; i < 5; i++) {
                const cloudX = (gameState.backgroundX * 0.5 + i * 200) % (canvas.width + 100);
                ctx.beginPath();
                ctx.arc(cloudX, 50 + i * 20, 20, 0, Math.PI * 2);
                ctx.arc(cloudX + 20, 50 + i * 20, 25, 0, Math.PI * 2);
                ctx.arc(cloudX + 40, 50 + i * 20, 20, 0, Math.PI * 2);
                ctx.fill();
            }

            // 땅
            ctx.fillStyle = '#8BC34A';
            ctx.fillRect(0, player.groundY + player.height, canvas.width, canvas.height);

            // 땅 무늬
            ctx.strokeStyle = '#689F38';
            ctx.lineWidth = 2;
            for (let i = 0; i < canvas.width; i += 30) {
                const grassX = (i - gameState.backgroundX) % canvas.width;
                ctx.beginPath();
                ctx.moveTo(grassX, player.groundY + player.height);
                ctx.lineTo(grassX + 5, player.groundY + player.height + 10);
                ctx.moveTo(grassX + 10, player.groundY + player.height);
                ctx.lineTo(grassX + 15, player.groundY + player.height + 10);
                ctx.stroke();
            }
        }

        // SESE 캐릭터 그리기 (플레이 중)
        function drawPlayer() {
            if (imagesLoaded.play) {
                ctx.drawImage(playSeseImg, player.x, player.y, player.width, player.height);
            } else {
                // 기본 펭귄 그리기
                drawDefaultPenguin();
            }
        }

        // 기본 펭귄 그리기
        function drawDefaultPenguin() {
            const px = player.x;
            const py = player.y;
            
            ctx.fillStyle = '#FF8C00';
            ctx.beginPath();
            ctx.ellipse(px + 20, py + player.height - 5, 8, 5, 0, 0, Math.PI * 2);
            ctx.ellipse(px + 40, py + player.height - 5, 8, 5, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#2C3E50';
            ctx.beginPath();
            ctx.ellipse(px + player.width/2, py + 40, 25, 35, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.ellipse(px + player.width/2, py + 45, 18, 25, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#2C3E50';
            ctx.beginPath();
            ctx.arc(px + player.width/2, py + 18, 20, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.ellipse(px + player.width/2, py + 22, 14, 12, 0, 0, Math.PI);
            ctx.fill();

            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(px + player.width/2 - 7, py + 15, 5, 0, Math.PI * 2);
            ctx.arc(px + player.width/2 + 7, py + 15, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(px + player.width/2 - 6, py + 15, 3, 0, Math.PI * 2);
            ctx.arc(px + player.width/2 + 8, py + 15, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FF8C00';
            ctx.beginPath();
            ctx.moveTo(px + player.width/2 - 5, py + 22);
            ctx.lineTo(px + player.width/2 + 5, py + 22);
            ctx.lineTo(px + player.width/2, py + 26);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#2C3E50';
            ctx.beginPath();
            ctx.ellipse(px + 10, py + 40, 7, 20, -0.3, 0, Math.PI * 2);
            ctx.ellipse(px + 50, py + 40, 7, 20, 0.3, 0, Math.PI * 2);
            ctx.fill();
        }

        // 아이템 그리기
        function drawItems() {
            items.forEach(function(item, index) {
                if (!item.collected) {
                    ctx.fillStyle = '#4CAF50';
                    ctx.beginPath();
                    ctx.arc(item.x + item.width / 2, item.y + 15, item.width / 2, Math.PI, 0);
                    ctx.fill();

                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(item.x + 15, item.y + 9, 5, 0, Math.PI * 2);
                    ctx.arc(item.x + 27, item.y + 12, 5, 0, Math.PI * 2);
                    ctx.arc(item.x + 38, item.y + 9, 5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#FFF9C4';
                    ctx.fillRect(item.x + item.width / 2 - 7, item.y + 15, 14, 20);

                    ctx.fillStyle = '#1565C0';
                    ctx.font = 'bold 14px Malgun Gothic';
                    ctx.textAlign = 'center';
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 4;
                    
                    const lines = item.text.split('\n');
                    lines.forEach(function(line, i) {
                        ctx.strokeText(line, item.x + item.width / 2, item.y + 50 + i * 16);
                        ctx.fillText(line, item.x + item.width / 2, item.y + 50 + i * 16);
                    });

                    item.x -= gameState.gameSpeed;

                    if (checkCollision(player, item)) {
                        item.collected = true;
                        gameState.itemsCollected++;
                        gameState.score += 10;
                        createParticles(item.x + item.width/2, item.y + item.height/2, '#4CAF50', '청렴!');
                    }

                    if (item.x + item.width < 0) {
                        items.splice(index, 1);
                    }
                }
            });
        }

        // 적 그리기
        function drawEnemies() {
            enemies.forEach(function(enemy, index) {
                if (!enemy.killed) {
                    ctx.fillStyle = '#F44336';
                    ctx.beginPath();
                    ctx.arc(enemy.x + 27, enemy.y + 17, 17, 0, Math.PI * 2);
                    ctx.fill();

                    for (let i = 0; i < 8; i++) {
                        const angle = (Math.PI * 2 / 8) * i;
                        const spikeX = enemy.x + 27 + Math.cos(angle) * 17;
                        const spikeY = enemy.y + 17 + Math.sin(angle) * 17;
                        ctx.fillStyle = '#D32F2F';
                        ctx.beginPath();
                        ctx.arc(spikeX, spikeY, 5, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(enemy.x + 22, enemy.y + 14, 5, 0, Math.PI * 2);
                    ctx.arc(enemy.x + 32, enemy.y + 14, 5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(enemy.x + 22, enemy.y + 14, 2.5, 0, Math.PI * 2);
                    ctx.arc(enemy.x + 32, enemy.y + 14, 2.5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#C62828';
                    ctx.font = 'bold 13px Malgun Gothic';
                    ctx.textAlign = 'center';
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 4;
                    
                    const lines = enemy.text.split('\n');
                    lines.forEach(function(line, i) {
                        ctx.strokeText(line, enemy.x + 27, enemy.y + 50 + i * 15);
                        ctx.fillText(line, enemy.x + 27, enemy.y + 50 + i * 15);
                    });

                    enemy.x -= gameState.gameSpeed;

                    if (player.velocityY > 0 && 
                        player.x < enemy.x + enemy.width &&
                        player.x + player.width > enemy.x &&
                        player.y + player.height >= enemy.y &&
                        player.y + player.height <= enemy.y + enemy.height + 10) {
                        enemy.killed = true;
                        gameState.enemiesKilled++;
                        gameState.score += 15;
                        player.velocityY = player.jumpPower * 0.5;
                        createParticles(enemy.x + enemy.width/2, enemy.y + enemy.height/2, '#FF5722', '청렴!');
                    }

                    if (!enemy.killed && 
                        player.x < enemy.x + enemy.width &&
                        player.x + player.width > enemy.x &&
                        player.y + player.height > enemy.y + 10 &&
                        player.velocityY <= 0) {
                        gameOver();
                    }

                    if (enemy.x + enemy.width < 0) {
                        enemies.splice(index, 1);
                    }
                }
            });
        }

        // 파티클 업데이트
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // 충돌 감지
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // 점수판 그리기
        function drawScore() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
            ctx.fillRect(10, 10, 320, 115);
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 3;
            ctx.strokeRect(10, 10, 320, 115);

            ctx.fillStyle = '#333';
            ctx.font = 'bold 19px Malgun Gothic';
            ctx.textAlign = 'left';
            ctx.fillText('점수: ' + gameState.score, 25, 42);
            ctx.fillText('📘 신고의무: ' + gameState.itemsCollected + '/5', 25, 72);
            ctx.fillText('🦠 금지행위 제거: ' + gameState.enemiesKilled + '/5', 25, 102);
        }

        // 플레이어 업데이트
        function updatePlayer() {
            player.velocityY += player.gravity;
            player.y += player.velocityY;

            if (player.y >= player.groundY) {
                player.y = player.groundY;
                player.velocityY = 0;
                player.jumping = false;
            }
        }

        // 점프
        function jump() {
            if (!player.jumping && player.y === player.groundY) {
                player.velocityY = player.jumpPower;
                player.jumping = true;
            }
        }

        // 게임 오버
        function gameOver() {
            gameState.running = false;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 50px Malgun Gothic';
            ctx.textAlign = 'center';
            ctx.fillText('게임 오버!', canvas.width / 2, canvas.height / 2 - 50);
            
            ctx.font = '24px Malgun Gothic';
            ctx.fillText('최종 점수: ' + gameState.score, canvas.width / 2, canvas.height / 2 + 10);
            ctx.fillText('스페이스바를 눌러 다시 시작', canvas.width / 2, canvas.height / 2 + 60);
        }

        // 게임 클리어 (인사하는 SESE와 함께!)
        function gameClear() {
            gameState.running = false;
            
            ctx.fillStyle = 'rgba(0, 100, 0, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 인사하는 SESE 그리기
            if (imagesLoaded.clear) {
                ctx.drawImage(clearSeseImg, canvas.width / 2 - 100, canvas.height / 2 - 180, 200, 200);
            }
            
            // 말풍선 효과
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.roundRect(canvas.width / 2 - 180, canvas.height / 2 + 40, 360, 80, 20);
            ctx.fill();
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // 말풍선 꼬리
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 50, canvas.height / 2 + 40);
            ctx.lineTo(canvas.width / 2 - 30, canvas.height / 2 + 20);
            ctx.lineTo(canvas.width / 2 - 20, canvas.height / 2 + 40);
            ctx.closePath();
            ctx.fill();
            
            // 메시지
            ctx.fillStyle = '#FF6B35';
            ctx.font = 'bold 40px Malgun Gothic';
            ctx.textAlign = 'center';
            ctx.fillText('당신도 청렴왕!', canvas.width / 2, canvas.height / 2 + 85);
            
            ctx.fillStyle = '#4CAF50';
            ctx.font = 'bold 60px Malgun Gothic';
            ctx.fillText('🎉 클리어! 🎉', canvas.width / 2, canvas.height / 2 - 200);
            
            ctx.fillStyle = '#fff';
            ctx.font = '20px Malgun Gothic';
            ctx.fillText('최종 점수: ' + gameState.score, canvas.width / 2, canvas.height / 2 + 150);
            ctx.fillText('스페이스바를 눌러 다시 시작', canvas.width / 2, canvas.height / 2 + 180);
        }

        // 게임 리셋
        function resetGame() {
            gameState = {
                running: true,
                score: 0,
                itemsCollected: 0,
                enemiesKilled: 0,
                gameSpeed: 3,
                backgroundX: 0
            };
            
            player.y = player.groundY;
            player.velocityY = 0;
            player.jumping = false;
            
            items = [];
            enemies = [];
            particles = [];
        }

        // 게임 루프
        let lastItemTime = 0;
        let lastEnemyTime = 0;
        let frameCount = 0;

        function gameLoop() {
            if (!gameState.running) {
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            gameState.backgroundX += gameState.gameSpeed;

            updatePlayer();
            drawPlayer();

            frameCount++;
            if (frameCount - lastItemTime > 120 && gameState.itemsCollected < 5) {
                createItem();
                lastItemTime = frameCount;
            }

            if (frameCount - lastEnemyTime > 180 && gameState.enemiesKilled < 5) {
                createEnemy();
                lastEnemyTime = frameCount;
            }

            drawItems();
            drawEnemies();
            updateParticles();
            drawScore();

            if (gameState.itemsCollected >= 5 && gameState.enemiesKilled >= 5) {
                gameClear();
                return;
            }

            if (frameCount % 600 === 0) {
                gameState.gameSpeed += 0.5;
            }

            requestAnimationFrame(gameLoop);
        }

        // 키보드 이벤트
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (!gameState.running) {
                    resetGame();
                    gameLoop();
                } else {
                    jump();
                }
            }
        });

        // 시작 화면 (탐정 SESE와 함께!)
        function drawStartScreen() {
            ctx.fillStyle = 'rgba(102, 126, 234, 0.9)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 탐정 SESE 그리기
            if (imagesLoaded.start) {
                ctx.drawImage(startSeseImg, canvas.width / 2 - 120, 80, 240, 240);
            }
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 48px Malgun Gothic';
            ctx.textAlign = 'center';
            ctx.fillText('🐧 청렴 러너 게임', canvas.width / 2, 360);
            
            ctx.font = '24px Malgun Gothic';
            ctx.fillText('SESE와 함께하는 이해충돌방지법', canvas.width / 2, 400);
            
            ctx.font = '20px Malgun Gothic';
            ctx.fillText('📘 5대 신고·제출의무를 수집하세요', canvas.width / 2, 440);
            ctx.fillText('🦠 5대 제한·금지행위를 밟아 제거하세요', canvas.width / 2, 465);
            
            ctx.font = 'bold 28px Malgun Gothic';
            ctx.fillStyle = '#FFD700';
            ctx.fillText('스페이스바를 눌러 시작!', canvas.width / 2, 510);
        }

        // roundRect 폴리필 (구형 브라우저 지원)
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.beginPath();
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
                return this;
            };
        }

        // 초기 화면
        drawStartScreen();
    </script>
</body>
